# Fly.io app for Playwright audits and screenshots.
# Deploy from repository root (`.` = build context so Dockerfile can COPY scripts/):
#   fly deploy . --config scripts/browser-service/fly.toml

app = 'nth-scanner-browser'
primary_region = 'lhr'

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  PLAYWRIGHT_BROWSERS_PATH = '/ms-playwright'
  LIGHTHOUSE_BINARY = '/app/scripts/node_modules/.bin/lighthouse'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '60s'
    interval = '15s'
    method = 'GET'
    path = '/health'
    timeout = '10s'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
