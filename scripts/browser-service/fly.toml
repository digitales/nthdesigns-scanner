# Fly.io app for Playwright audits and screenshots.
# From repo root: fly launch --config scripts/browser-service/fly.toml --dockerfile scripts/browser-service/Dockerfile

app = 'nth-scanner-browser'
primary_region = 'lhr'

[build]
  dockerfile = 'scripts/browser-service/Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '20s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
