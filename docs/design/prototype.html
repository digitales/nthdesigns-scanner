<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Prospect Scanner — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────────────────────
   PROSPECT SCANNER — shared tokens + component CSS
   ────────────────────────────────────────────────────────────── */
:root {
  /* warm-tinted neutrals */
  --paper:        oklch(0.985 0.006 80);
  --paper-2:      oklch(0.965 0.009 80);
  --stone-100:    oklch(0.945 0.010 75);
  --stone-200:    oklch(0.905 0.012 72);
  --stone-300:    oklch(0.835 0.014 68);
  --stone-400:    oklch(0.715 0.016 64);
  --stone-500:    oklch(0.560 0.016 60);
  --stone-600:    oklch(0.430 0.013 56);
  --stone-700:    oklch(0.305 0.011 54);
  --stone-800:    oklch(0.225 0.009 54);
  --ink:          oklch(0.155 0.008 52);

  /* accent (tweakable) — defaults to ochre */
  --accent:       oklch(0.705 0.140 65);
  --accent-soft:  oklch(0.945 0.045 75);
  --accent-deep:  oklch(0.500 0.130 55);
  --accent-ink:   oklch(0.290 0.080 50);

  /* severity */
  --sev-critical:      oklch(0.515 0.180 28);
  --sev-critical-soft: oklch(0.945 0.045 30);
  --sev-serious:       oklch(0.660 0.155 52);
  --sev-serious-soft:  oklch(0.955 0.050 70);
  --sev-moderate:      oklch(0.610 0.085 85);
  --sev-moderate-soft: oklch(0.960 0.035 90);
  --positive:          oklch(0.580 0.110 145);
  --positive-soft:     oklch(0.945 0.045 145);

  /* score bands */
  --score-low-bg:  var(--stone-100);
  --score-mid-bg:  oklch(0.93 0.020 75);
  --score-high-bg: var(--accent-soft);

  /* surfaces */
  --line:         oklch(0.895 0.012 70);
  --line-strong:  oklch(0.825 0.014 68);
  --shadow-1: 0 1px 0 oklch(1 0 0 / .8) inset, 0 1px 2px oklch(0 0 0 / .04);
  --shadow-2: 0 1px 0 oklch(1 0 0 / .9) inset, 0 8px 24px -8px oklch(0 0 0 / .12);
  --shadow-3: 0 1px 0 oklch(1 0 0 / .9) inset, 0 18px 48px -16px oklch(0 0 0 / .22);

  /* type */
  --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
  --sans: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01";
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }
::selection { background: var(--accent-soft); color: var(--accent-ink); }
.tabular, .num { font-variant-numeric: tabular-nums; }
.mono { font-family: var(--mono); }
.serif { font-family: var(--serif); }

.micro {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--stone-500);
  letter-spacing: 0.04em;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--stone-500);
}

/* ──────────────────────────────────────────────────────────────
   APP SHELL
   ────────────────────────────────────────────────────────────── */
.app { min-height: 100vh; background: var(--paper); }
.app-topbar {
  height: 56px;
  border-bottom: 1px solid var(--line);
  background: oklch(0.99 0.005 80 / 0.92);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 18px;
  border-right: 1px solid var(--line);
  height: 56px;
}
.brand-mark {
  width: 20px;
  height: 20px;
  position: relative;
  flex-shrink: 0;
}
.brand-mark::before, .brand-mark::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 1.4px solid var(--ink);
}
.brand-mark::after { transform: rotate(45deg); border-color: var(--accent); }
.brand-name {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  letter-spacing: -0.01em;
}
.brand-sep {
  color: var(--stone-400);
  font-family: var(--mono);
  font-size: 11px;
}
.brand-product {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--stone-700);
}

.app-nav {
  display: flex;
  gap: 2px;
  align-items: center;
  flex: 1;
}
.app-nav a {
  font-size: 13px;
  font-weight: 500;
  color: var(--stone-600);
  padding: 7px 12px;
  border-radius: 4px;
  letter-spacing: -0.005em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.app-nav a:hover { background: var(--stone-100); color: var(--ink); }
.app-nav a.active { color: var(--ink); background: var(--stone-100); }
.app-nav a .count {
  font-family: var(--mono);
  font-size: 10.5px;
  background: var(--ink);
  color: var(--paper);
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 500;
  line-height: 1.4;
}
.app-nav a.active .count { background: var(--accent-deep); }

.app-tools {
  display: flex;
  align-items: center;
  gap: 12px;
}
.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--stone-700);
  padding: 5px 10px 5px 5px;
  border-radius: 999px;
  border: 1px solid var(--line);
}
.avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* ──────────────────────────────────────────────────────────────
   PAGE HEADER (inside screens)
   ────────────────────────────────────────────────────────────── */
.page {
  padding: 36px 40px 80px;
  max-width: 1440px;
  margin: 0 auto;
}
.page-wide { padding: 36px 32px 80px; }
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 32px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.page-header h1 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 36px;
  line-height: 1.1;
  letter-spacing: -0.018em;
  margin: 6px 0 0;
}
.page-header p {
  font-size: 14px;
  color: var(--stone-600);
  margin: 8px 0 0;
  max-width: 540px;
}
.page-header .header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.back-link {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--stone-500);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.back-link:hover { color: var(--ink); }

/* ──────────────────────────────────────────────────────────────
   BUTTONS
   ────────────────────────────────────────────────────────────── */
.btn {
  font-family: var(--sans);
  font-size: 13.5px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 4px;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--ink);
  transition: background-color .12s, border-color .12s, color .12s;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1.1;
  white-space: nowrap;
}
.btn-primary { background: var(--ink); color: var(--paper); }
.btn-primary:hover { background: var(--stone-800); }
.btn-accent { background: var(--accent-deep); color: var(--paper); }
.btn-accent:hover { background: var(--accent-ink); }
.btn-secondary { background: var(--paper); border-color: var(--line-strong); color: var(--ink); }
.btn-secondary:hover { background: var(--paper-2); border-color: var(--stone-400); }
.btn-ghost { color: var(--stone-700); }
.btn-ghost:hover { background: var(--stone-100); color: var(--ink); }
.btn-destructive { color: var(--sev-critical); border-color: oklch(0.515 0.180 28 / 0.3); background: var(--paper); }
.btn-destructive:hover { background: var(--sev-critical-soft); }
.btn-sm { font-size: 12px; padding: 5px 10px; gap: 5px; }
.btn-xs { font-size: 11px; padding: 4px 8px; gap: 4px; }
.btn-lg { font-size: 14.5px; padding: 11px 20px; gap: 8px; }
.btn[disabled] { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.btn .ico { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.6; fill: none; flex-shrink: 0; }

/* ──────────────────────────────────────────────────────────────
   FIELDS
   ────────────────────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 11.5px;
  font-weight: 500;
  color: var(--stone-700);
  letter-spacing: 0.005em;
  display: flex;
  justify-content: space-between;
}
.field-hint { font-family: var(--mono); font-size: 10.5px; color: var(--stone-500); }
.input, .select, .textarea {
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  padding: 9px 12px;
  width: 100%;
  transition: border-color .12s, box-shadow .12s;
}
.input:focus, .select:focus, .textarea:focus {
  outline: none;
  border-color: var(--accent-deep);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.input::placeholder, .textarea::placeholder { color: var(--stone-400); }
.select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23736b5c' stroke-width='1.4' fill='none'/></svg>");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
}
.textarea { resize: vertical; min-height: 100px; line-height: 1.55; }
.input-with-prefix {
  display: flex;
  align-items: stretch;
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  background: var(--paper);
}
.input-with-prefix .prefix {
  background: var(--paper-2);
  border-right: 1px solid var(--line);
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--stone-600);
}
.input-with-prefix input {
  border: 0;
  padding: 9px 12px;
  background: transparent;
  font-family: var(--sans);
  font-size: 13.5px;
  color: var(--ink);
  flex: 1;
  outline: none;
}

/* checkbox */
.checkbox {
  appearance: none;
  width: 15px;
  height: 15px;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  background: var(--paper);
  cursor: pointer;
  position: relative;
  vertical-align: -2px;
  flex-shrink: 0;
}
.checkbox:checked {
  background: var(--ink);
  border-color: var(--ink);
}
.checkbox:checked::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 4px;
  width: 4px;
  height: 8px;
  border: solid var(--paper);
  border-width: 0 1.6px 1.6px 0;
  transform: rotate(45deg);
}

/* radio group / segmented */
.segmented {
  display: inline-flex;
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  background: var(--paper);
  padding: 2px;
  gap: 1px;
}
.segmented button {
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--stone-700);
  background: transparent;
  border: 0;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  letter-spacing: -0.005em;
}
.segmented button:hover { background: var(--paper-2); }
.segmented button.active { background: var(--ink); color: var(--paper); }

/* ──────────────────────────────────────────────────────────────
   BADGES
   ────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--stone-100);
  color: var(--stone-700);
  line-height: 1.4;
}
.badge .dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.55; }

.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 12.5px;
  font-weight: 500;
  padding: 4px 9px 4px 7px;
  border-radius: 3px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  border: 1px solid transparent;
}
.score-badge.low { background: var(--score-low-bg); color: var(--stone-700); border-color: var(--stone-200); }
.score-badge.mid { background: var(--score-mid-bg); color: var(--ink); border-color: oklch(0.85 0.03 75); }
.score-badge.high { background: var(--score-high-bg); color: var(--accent-ink); border-color: oklch(0.85 0.08 65); }
.score-badge .num { font-weight: 600; }
.score-badge .bar {
  width: 24px;
  height: 3px;
  border-radius: 2px;
  background: oklch(0 0 0 / 0.08);
  position: relative;
  overflow: hidden;
}
.score-badge .bar::after {
  content: "";
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0.7;
}

/* Score with adjacent weak-pip (used for Perf column when value < 30) */
.score-with-pip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.weak-pip {
  width: 7px;
  height: 7px;
  background: var(--sev-critical);
  border-radius: 1px;
  display: inline-block;
  flex-shrink: 0;
}

/* Outreach card — secondary "slow site" signal */
.slow-site-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  font-family: var(--mono);
  color: var(--stone-500);
  letter-spacing: 0.02em;
  padding: 1px 6px 1px 5px;
  border-radius: 2px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  line-height: 1.5;
}
.slow-site-tag::before {
  content: "";
  width: 5px;
  height: 5px;
  background: var(--sev-critical);
  border-radius: 1px;
  flex-shrink: 0;
}

.angle-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px 2px 6px;
  border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: var(--paper);
  color: var(--stone-700);
  line-height: 1.5;
  white-space: nowrap;
}
.angle-pill .glyph {
  width: 12px;
  height: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1;
}
.angle-pill.gbp .glyph { color: var(--stone-600); }
.angle-pill.a11y .glyph { color: var(--accent-deep); }
.angle-pill.both .glyph { color: var(--ink); }

.sev-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 11.5px;
  font-weight: 500;
  padding: 3px 9px 3px 8px;
  border-radius: 3px;
  line-height: 1.3;
  border: 1px solid transparent;
}
.sev-chip .pip { width: 6px; height: 6px; background: currentColor; flex-shrink: 0; }
.sev-chip.critical { color: var(--sev-critical); background: var(--sev-critical-soft); border-color: oklch(0.515 0.180 28 / 0.18); }
.sev-chip.critical .pip { border-radius: 0; }
.sev-chip.serious { color: oklch(0.45 0.13 50); background: var(--sev-serious-soft); border-color: oklch(0.660 0.155 52 / 0.22); }
.sev-chip.serious .pip { border-radius: 1px; transform: rotate(45deg); }
.sev-chip.moderate { color: oklch(0.42 0.07 80); background: var(--sev-moderate-soft); border-color: oklch(0.610 0.085 85 / 0.25); }
.sev-chip.moderate .pip { border-radius: 50%; }

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--stone-700);
  padding: 2px 9px;
  border-radius: 999px;
  background: var(--paper-2);
  border: 1px solid var(--line);
  white-space: nowrap;
}
.status .led {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--stone-400);
}
.status.ready .led { background: var(--positive); }
.status.pending .led { background: var(--sev-serious); animation: pulse 1.6s ease-in-out infinite; }
.status.failed .led { background: var(--sev-critical); }
.status.warm { background: var(--accent-soft); border-color: oklch(0.85 0.08 65); color: var(--accent-ink); }
.status.warm .led { background: var(--accent); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ──────────────────────────────────────────────────────────────
   CARDS & PANELS
   ────────────────────────────────────────────────────────────── */
.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 6px;
}
.card-pad { padding: 22px 24px; }
.card-title {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--stone-500);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 0 0 12px;
  font-weight: 500;
}
.card h3.title {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 500;
  margin: 0 0 4px;
  letter-spacing: -0.005em;
}

.score-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 18px 20px 20px;
  position: relative;
}
.score-card.highlight { border-color: oklch(0.85 0.08 65); background: linear-gradient(180deg, var(--accent-soft) 0%, var(--paper) 70%); }
.score-card .label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--stone-600);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.score-card .value {
  font-family: var(--serif);
  font-size: 48px;
  line-height: 1;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.score-card.highlight .value { color: var(--accent-ink); }
.score-card .value .unit {
  font-size: 14px;
  color: var(--stone-500);
  margin-left: 3px;
  font-family: var(--mono);
  letter-spacing: 0;
}
.score-card .delta {
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--stone-500);
  margin-top: 8px;
  letter-spacing: 0.02em;
}

/* ──────────────────────────────────────────────────────────────
   TABLE
   ────────────────────────────────────────────────────────────── */
.ptable {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
}
.ptable thead th {
  text-align: left;
  font-family: var(--mono);
  font-weight: 500;
  font-size: 10.5px;
  color: var(--stone-500);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--paper-2);
  white-space: nowrap;
}
.ptable thead th:first-child { padding-left: 20px; }
.ptable thead th:last-child { padding-right: 20px; }
.ptable thead th.sortable { cursor: pointer; }
.ptable thead th.sortable:hover { color: var(--ink); }
.ptable thead th .sort-glyph { color: var(--stone-400); margin-left: 4px; }
.ptable tbody td {
  padding: 14px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  color: var(--ink);
}
.ptable tbody td:first-child { padding-left: 20px; }
.ptable tbody td:last-child { padding-right: 20px; }
.ptable tbody tr:last-child td { border-bottom: 0; }
.ptable tbody tr:hover { background: var(--paper-2); cursor: pointer; }
.ptable .biz { font-weight: 500; }
.ptable .biz .url {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--stone-500);
  font-weight: 400;
  margin-top: 2px;
  letter-spacing: 0;
}
.ptable tbody tr.warm { background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 50%); }
.ptable tbody tr.warm:hover { background: linear-gradient(90deg, var(--accent-soft) 0%, var(--paper-2) 50%); }
.ptable tbody tr.failed td { color: var(--stone-500); }
.ptable tbody tr.expanded { background: var(--paper-2); }
.ptable tbody tr.selected { background: oklch(0.92 0.012 70); }
.ptable tbody tr.selected:hover { background: oklch(0.91 0.012 70); }

.row-actions {
  display: flex;
  gap: 2px;
  justify-content: flex-end;
  align-items: center;
}
.row-actions .btn-icon {
  width: 26px;
  height: 26px;
  border-radius: 3px;
  border: 0;
  background: transparent;
  color: var(--stone-500);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.row-actions .btn-icon:hover { background: var(--stone-200); color: var(--ink); }
.row-actions .btn-icon svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 1.6; fill: none; }

.expanded-row td {
  padding: 0 !important;
  background: var(--paper-2);
  border-bottom: 1px solid var(--line) !important;
}
.expanded-row .ex-inner {
  padding: 22px 24px 26px 50px;
  border-left: 3px solid var(--accent);
  margin-left: 14px;
}

/* skeleton */
.skel {
  background: linear-gradient(90deg, var(--stone-100) 0%, var(--stone-200) 50%, var(--stone-100) 100%);
  background-size: 200% 100%;
  border-radius: 3px;
  animation: shimmer 1.6s ease-in-out infinite;
  display: inline-block;
  height: 12px;
}
@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* ──────────────────────────────────────────────────────────────
   FILTER BAR
   ────────────────────────────────────────────────────────────── */
.filter-bar {
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 14px 18px;
  display: flex;
  gap: 14px;
  align-items: flex-end;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.filter-bar .field { gap: 4px; min-width: 0; }
.filter-bar .field-label { font-size: 10.5px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--stone-500); }
.filter-bar .input, .filter-bar .select { padding: 6px 10px; font-size: 13px; }
.filter-bar .select { padding-right: 26px; }
.filter-bar .filter-action {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ──────────────────────────────────────────────────────────────
   PROGRESS / RUNNING STATE
   ────────────────────────────────────────────────────────────── */
.progress-bar {
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 20px;
}
.progress-bar .progress-text {
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar .progress-text strong { font-weight: 500; }
.progress-bar .progress-meta { font-family: var(--mono); font-size: 11px; color: var(--stone-500); }
.progress-bar .progress-track {
  flex: 1;
  height: 4px;
  background: var(--stone-200);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.progress-bar .progress-fill {
  position: absolute;
  inset: 0;
  background: var(--ink);
  border-radius: 2px;
  transition: width 0.5s ease;
}
.progress-bar .progress-pct {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--stone-700);
  font-weight: 500;
  min-width: 36px;
  text-align: right;
}

.spinner {
  width: 12px;
  height: 12px;
  border: 1.5px solid var(--stone-300);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ──────────────────────────────────────────────────────────────
   ANNOTATION
   ────────────────────────────────────────────────────────────── */
.anno-toggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 60;
  background: var(--ink);
  color: var(--paper);
  border: 0;
  border-radius: 999px;
  padding: 9px 16px 9px 12px;

  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 24px oklch(0 0 0 / 0.18);
  letter-spacing: -0.005em;
  transition: transform .15s;
}
.anno-toggle:hover { transform: translateY(-1px); }
.anno-toggle.active { background: var(--accent-deep); }
.anno-toggle .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--paper);
  opacity: 0.7;
}
.anno-toggle.active .dot { background: var(--paper); opacity: 1; animation: pulse 1.8s ease-in-out infinite; }

.anno-pin {
  position: absolute;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--paper);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 4px oklch(1 0 0 / 0.65), 0 2px 8px oklch(0 0 0 / 0.2);
  line-height: 1;
  cursor: default;
  z-index: 40;
  transform-origin: center;
  animation: pin-in 0.3s ease backwards;
}
@keyframes pin-in {
  from { opacity: 0; transform: scale(0.4); }
  to { opacity: 1; transform: scale(1); }
}

.anno-callout {
  position: absolute;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 14px;
  border-radius: 4px;
  font-size: 12px;
  line-height: 1.5;
  max-width: 260px;
  box-shadow: 0 10px 28px oklch(0 0 0 / 0.22);
  z-index: 41;

.anno-callout::before {
  content: "";

@keyframes toast-in {

  justify-content: center;
}
.toast .check svg { width: 10px; height: 10px; stroke: var(--paper); stroke-width: 2; fill: none; }

function ScoreBadge({ value, withBar = true, size = "md", weakPip = false }) {
  if (value == null || value === "—") {
    return <span className="score-badge low" style={{ opacity: 0.5 }}><span className="num">—</span></span>;
  }
  const band = scoreBand(value);
  const barPct = Math.min(100, Math.max(8, value));
  const badge = (
    <span className={`score-badge ${band}`}>
      {withBar ? (
        <span className="bar">
          <span style={{ position: "absolute", inset: 0, background: "currentColor", opacity: 0.7, right: `${100 - barPct}%` }} />
        </span>
      ) : null}
      <span className="num">{value}</span>
    </span>
  );
  if (weakPip) {
    return (
      <span className="score-with-pip">
        {badge}
        <span className="weak-pip" title="Below 30 — meaningful weakness in this column" />
      </span>
    );
  }
  return badge;
}

// ─── Pitch angle pill ─────────────────────────────────────────────
function AnglePill({ angle }) {
  const map = {
    gbp:  { cls: "gbp",  glyph: "◐", label: "GBP" },
    a11y: { cls: "a11y", glyph: "◢", label: "Accessibility" },
    both: { cls: "both", glyph: "◆", label: "Both" }
  };
  const m = map[angle] || map.both;
  return (
    <span className={`angle-pill ${m.cls}`}>
      <span className="glyph">{m.glyph}</span>
      {m.label}
    </span>
  );
}

// ─── Severity chip ────────────────────────────────────────────────
function SevChip({ level, count, label }) {
  const m = { critical: "Critical", serious: "Serious", moderate: "Moderate" };
  return (
    <span className={`sev-chip ${level}`}>
      <span className="pip" />
      {label || m[level]}{count != null ? ` · ${count}` : ""}
    </span>
  );
}

// ─── Status pill ──────────────────────────────────────────────────
function Status({ kind = "ready", children }) {
  return (
    <span className={`status ${kind}`}>
      <span className="led" />
      {children}
    </span>
  );
}

// ─── Badge ────────────────────────────────────────────────────────
function Badge({ children, dot = true }) {
  return (
    <span className="badge">
      {dot && <span className="dot" />}
      {children}
    </span>
  );
}

// ─── Field ────────────────────────────────────────────────────────
function Field({ label, hint, children }) {

}

// ─── Segmented ────────────────────────────────────────────────────
function Segmented({ value, onChange, options }) {
  return (
    <div className="segmented">
      {options.map(o => (
        <button
          key={o.value}
          className={o.value === value ? "active" : ""}
          onClick={() => onChange(o.value)}
        >
          {o.label}
        </button>
      ))}
    </div>
  );
}

// ─── Checkbox ────────────────────────────────────────────────────
function Checkbox({ checked, onChange, indeterminate }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.indeterminate = !!indeterminate;
  }, [indeterminate]);
  return (
    <input
      ref={ref}
      type="checkbox"
      className="checkbox"
      checked={!!checked}
      onChange={(e) => onChange && onChange(e.target.checked)}
      onClick={(e) => e.stopPropagation()}
    />
  );
}

// ─── Avatar ──────────────────────────────────────────────────────
function Avatar({ initials = "AN" }) {
  return <span className="avatar">{initials}</span>;
}

// ─── Annotation pin + callout (positioned absolutely by parent) ──
// AnnotationContext: { active: bool, openId: string | null }
const AnnoCtx = React.createContext({ active: false, openId: null, setOpen: () => {} });

function AnnoProvider({ active, children }) {
  const [openId, setOpen] = useState(null);
  // Close when annotation mode turned off
  useEffect(() => { if (!active) setOpen(null); }, [active]);
  return <AnnoCtx.Provider value={{ active, openId, setOpen }}>{children}</AnnoCtx.Provider>;
}

function Anno({ id, n, position = { top: 0, left: 0 }, callout, calloutPosition }) {
  const { active, openId, setOpen } = React.useContext(AnnoCtx);
  if (!active) return null;
  const isOpen = openId === id;
  const onEnter = () => setOpen(id);
  const onLeave = () => setOpen((cur) => (cur === id ? null : cur));
  return (
    <>
      <span
        className="anno-pin"
        style={position}
        onMouseEnter={onEnter}
        onMouseLeave={onLeave}
      >{n}</span>
      {isOpen && callout && (
        <span
          className="anno-callout"
          style={calloutPosition || { top: position.top, left: (typeof position.left === "number" ? position.left + 34 : `calc(${position.left} + 34px)`) }}
          onMouseEnter={onEnter}
          onMouseLeave={onLeave}
        >
          {callout}
        </span>
      )}
    </>
  );
}

// ─── Toast ────────────────────────────────────────────────────────
function Toast({ children, onClose }) {
  useEffect(() => {
    const t = setTimeout(() => onClose && onClose(), 3200);
    return () => clearTimeout(t);
  }, [onClose]);
  return (
    <div className="toast">
      <span className="check">
        <svg viewBox="0 0 12 12"><path d="M3 6.5l2 2 4-5" /></svg>
      </span>
      {children}
    </div>
  );
}

          <span className="user-chip">
            <Avatar initials="AN" />
            Alex N
          </span>
        </div>
      </div>
      {children}
    </div>
  );
}

// ─── Page header ──────────────────────────────────────────────────
function PageHeader({ eyebrow, title, sub, actions, back, onBack }) {

    if (!running) return;

        />

          position={{ top: 220, left: 8 }}

          </>}

        <Anno id="b-4" n="4"
          position={{ top: 84, right: 60, left: "auto" }}

            <div className="micro">SCORE 87 · COMBINED</div>

      </div>

      {!running && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, fontSize: 12, color: "var(--stone-500)" }}>

    </main>

}

            </div>

                  {inOutreach ? "In queue" : "Add to outreach"}

          {/* Meta */}
          <div className="card card-pad" style={{ marginTop: 16 }}>

      </div>
    </main>

            <div className="card-title" style={{ marginBottom: 16 }}>Generation parameters</div>
            <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 0.8fr auto", gap: 14, alignItems: "flex-end" }}>
              <Field label="Pitch angle override" hint={pitchAngle === "auto" ? "uses dominant_angle per prospect" : ""}>
                <Segmented value={pitchAngle} onChange={setPitchAngle}
                  options={[
                    { value: "auto", label: "Auto" },
                    { value: "gbp", label: "GBP" },
                    { value: "a11y", label: "A11y" },
                    { value: "both", label: "Both" },
                  ]}
                />
              </Field>
              <Field label="Agency name" hint="appears in sign-off">
                <input className="input" value={agencyName} onChange={e => setAgencyName(e.target.value)} />
              </Field>
              <Field label="CPC benchmark" hint="optional · £ / click">
                <div className="input-with-prefix">
                  <span className="prefix">£</span>
                  <input value={cpc} onChange={e => setCpc(e.target.value)} placeholder="14.20" />
                </div>
              </Field>
              <Button kind="primary" onClick={generateAll} disabled={generating || eligible.length === 0} iconRight={generating ? null : Icons.PlayCircle}>
                {generating ? <><span className="spinner" /> Generating…</> : `Generate ${eligible.length}`}
              </Button>
            </div>

            {skipped.length > 0 && (
              <div style={{
                marginTop: 14,
                padding: "10px 14px",
                background: "var(--sev-moderate-soft)",
                border: "1px solid oklch(0.610 0.085 85 / 0.25)",
                borderRadius: 4,
                fontSize: 12.5,
                color: "oklch(0.40 0.07 80)",
                display: "flex",
                alignItems: "center",
                gap: 10
              }}>
                <Icon d={Icons.Lock} size={12} />
                <span>
                  <b>{skipped.length} prospect{skipped.length === 1 ? "" : "s"} will be skipped</b> until a report is generated — outreach requires an embedded link.
                  &nbsp;<a style={{ color: "inherit", textDecoration: "underline" }}>Generate reports</a>
                </span>
              </div>
            )}

            <Anno id="d-1" n="1"
              position={{ top: -10, left: -28 }}
              callout={<>
                <div className="micro">PITCH ANGLE</div>
                <b>Auto</b> uses each prospect's dominant_angle. Override only when you know your audience — e.g. all-solicitor batches usually pitch better with the accessibility angle.
              </>}
            />
          </div>

          {/* Email cards */}
          <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            {eligible.map(p => {
              const email = DATA.outreachEmails[p.id];
              if (!email) return null;
              const isSent = sentMap[p.id];
              const edit = emailEdits[p.id] || {};
              const subject = edit.subject ?? email.subject;
              const body = edit.body ?? email.body;
              return (
                <EmailCard
                  key={p.id}
                  prospect={p}
                  email={email}
                  subject={subject}
                  body={body}
                  isSent={isSent}
                  isActive={activeProspect === p.id}
                  onChangeSubject={(v) => setEmailEdits(e => ({ ...e, [p.id]: { ...(e[p.id] || {}), subject: v } }))}
                  onChangeBody={(v) => setEmailEdits(e => ({ ...e, [p.id]: { ...(e[p.id] || {}), body: v } }))}
                  onMarkSent={() => setSentMap(s => ({ ...s, [p.id]: !s[p.id] }))}
                  onPreview={() => navigate("public", { token: p.reportToken })}
                />
              );
            })}
          </div>

          <Anno id="d-2" n="2"
            position={{ top: 320, right: 60, left: "auto" }}
            callout={<>
              <div className="micro">EMAIL CARD</div>
              Subject + body are <b>directly editable</b>. The report URL line stays visible so operators can verify the link before copy/paste.
            </>}
          />
        </div>
      </div>
    </main>
  );
}

function EmailCard({ prospect, email, subject, body, isSent, onChangeSubject, onChangeBody, onMarkSent, onPreview }) {
  const [copied, setCopied] = useState(false);
  const p = prospect;

  const copyEmail = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`).catch(() => {});
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };

  return (
    <div className="card" style={{ padding: 0, opacity: isSent ? 0.7 : 1, transition: "opacity .2s" }}>
      {/* card header */}
      <div style={{
        padding: "14px 20px",
        borderBottom: "1px solid var(--line)",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        background: "var(--paper-2)"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0, flex: 1 }}>
          <div style={{ fontSize: 13, fontWeight: 500, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            To: {p.business}
            <span style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--stone-500)", marginLeft: 8 }}>
              &lt;hello@{p.url}&gt;
            </span>
          </div>
          <ScoreBadge value={p.combined} withBar={false} />
          <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 3 }}>
            <AnglePill angle={email.pitchAngle} />
            {p.perf != null && p.perf < 30 && (
              <span className="slow-site-tag" title={`Performance ${p.perf}/100 — slow-site line included in email body`}>+ slow site</span>
            )}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
          <Button kind="ghost" size="xs" icon={Icons.Eye} onClick={onPreview}>Preview report</Button>
          <Button kind="ghost" size="xs" icon={copied ? Icons.Check : Icons.Copy} onClick={copyEmail}>{copied ? "Copied" : "Copy"}</Button>
          <Button kind={isSent ? "secondary" : "primary"} size="xs" icon={isSent ? Icons.Check : Icons.Send} onClick={onMarkSent}>
            {isSent ? "Marked sent" : "Mark sent"}
          </Button>
        </div>
      </div>

      {/* subject + body */}
      <div style={{ padding: "18px 20px 22px" }}>
        <div style={{ marginBottom: 14 }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>Subject</div>
          <input
            className="input"
            value={subject}
            onChange={(e) => onChangeSubject(e.target.value)}
            style={{ fontSize: 14, fontWeight: 500, fontFamily: "var(--serif)", padding: "10px 12px" }}
            readOnly={isSent}
          />
        </div>
        <div>
          <div className="eyebrow" style={{ marginBottom: 6, display: "flex", justifyContent: "space-between" }}>
            <span>Body</span>
            <span className="num" style={{ fontSize: 10.5, color: "var(--stone-500)" }}>{body.length} chars · ~{Math.ceil(body.split(/\s+/).length / 220)} min read</span>
          </div>
          <textarea
            className="textarea"
            value={body}
            onChange={(e) => onChangeBody(e.target.value)}
            rows={14}
            style={{ fontSize: 13, fontFamily: "var(--sans)", lineHeight: 1.65, whiteSpace: "pre-wrap" }}
            readOnly={isSent}
          />
        </div>
      </div>

      {/* footer */}
      <div style={{
        padding: "12px 20px",
        borderTop: "1px solid var(--line)",
        background: "var(--paper-2)",
        display: "flex",
        justifyContent: "space-between",
        alignItems: "center",
        fontSize: 11.5,
        color: "var(--stone-500)"
      }}>
        <span className="mono">Embedded link: report.nthdesigns.co.uk/r/{p.reportToken}</span>
        {isSent && email.sentAt && <span className="mono">Sent {email.sentAt}</span>}
      </div>
    </div>
  );
}

window.OutreachScreen = OutreachScreen;

</script>
<script type="text/babel">
/* ── screens-management.jsx ── */
// screens-management.jsx — E (Saved), F (Reports), G (Settings)

// ─── E. Saved prospects ──────────────────────────────────────────
function SavedScreen({ navigate, addToOutreach, selection }) {
  const [filters, setFilters] = useState({
    from: "", to: "",
    niche: "all", city: "", scanType: "all",
    minScore: 0, angle: "all", warm: false
  });

  const setF = (k, v) => setFilters(s => ({ ...s, [k]: v }));

  // Filter prospects
  const filtered = DATA.prospects.filter(p => {
    if (p.status === "failed" || p.status === "pending") return false;
    if (filters.niche !== "all" && p.niche !== filters.niche) return false;
    if (filters.angle !== "all" && p.angle !== filters.angle) return false;
    if ((p.combined || 0) < filters.minScore) return false;
    if (filters.city && !p.city.toLowerCase().includes(filters.city.toLowerCase())) return false;
    if (filters.warm && !p.warm) return false;
    return true;
  }).sort((a, b) => (b.combined || 0) - (a.combined || 0));

  const warmLeads = DATA.prospects.filter(p => p.warm).sort((a, b) => (b.combined || 0) - (a.combined || 0));
  const niches = Array.from(new Set(DATA.prospects.map(p => p.niche)));
  const inOutreach = (id) => selection.includes(id);

  return (
    <main className="page-wide page" style={{ maxWidth: 1440, position: "relative" }}>
      <PageHeader
        eyebrow="E · Saved prospects"
        title="Every prospect, across every scan."
        sub="Filter across searches, mark warm leads, export the CSV for handoff."
        actions={
          <>
            <span className="micro">{filtered.length} of {DATA.prospects.length}</span>
            <Button kind="secondary" size="sm" icon={Icons.Download}>Export CSV</Button>
          </>
        }
      />

      {/* Warm leads panel */}
      {!filters.warm && warmLeads.length > 0 && (
        <div style={{
          background: "linear-gradient(180deg, var(--accent-soft) 0%, var(--paper) 100%)",
          border: "1px solid oklch(0.85 0.08 65)",
          borderRadius: 6,
          padding: "18px 22px",
          marginBottom: 24,
          position: "relative"
        }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
            <div>
              <div className="eyebrow" style={{ color: "var(--accent-ink)", marginBottom: 4 }}>Warm leads · viewed in last 7 days, no reply</div>
              <h2 style={{ fontFamily: "var(--serif)", fontWeight: 500, fontSize: 22, margin: 0, color: "var(--accent-ink)", letterSpacing: "-0.015em" }}>
                {warmLeads.length} prospects opened your report — follow up
              </h2>
            </div>
            <Button kind="accent" size="sm" iconRight={Icons.Arrow} onClick={() => setF("warm", true)}>
              Filter to warm
            </Button>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10 }}>
            {warmLeads.slice(0, 3).map(p => (
              <div
                key={p.id}
                className="card"
                style={{ padding: "14px 16px", cursor: "pointer", border: "1px solid var(--line)" }}
                onClick={() => navigate("prospect", { id: p.id })}
              >
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <div style={{ fontSize: 13, fontWeight: 500, lineHeight: 1.3 }}>{p.business}</div>
                  <ScoreBadge value={p.combined} withBar={false} />
                </div>
                <div className="mono" style={{ fontSize: 10.5, color: "var(--stone-500)", marginBottom: 8 }}>{p.url}</div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, color: "var(--stone-700)" }}>
                  <span>Viewed <b style={{ fontWeight: 500 }}>{p.lastViewed}</b></span>
                  <span style={{ color: "var(--stone-500)" }}>{p.outreachSent ? "Sent " + p.outreachSent.split(" · ")[0] : "Not sent"}</span>
                </div>
              </div>
            ))}
          </div>

          <Anno id="e-1" n="1"
            position={{ top: 8, right: 8, left: "auto" }}
            callout={<>
              <div className="micro">WARM PANEL</div>
              Strict definition: report <b>viewed_at</b> set + outreach <b>sent_at</b> set + no <b>response_received</b>. Disappears when filter is set to Warm only.
            </>}
          />
        </div>
      )}

      {/* Filter bar */}
      <div className="filter-bar">
        <Field label="Date from">
          <input type="date" className="input" value={filters.from} onChange={e => setF("from", e.target.value)} placeholder="—" style={{ width: 130 }} />
        </Field>
        <Field label="Date to">
          <input type="date" className="input" value={filters.to} onChange={e => setF("to", e.target.value)} style={{ width: 130 }} />
        </Field>
        <Field label="Niche">
          <select className="select" value={filters.niche} onChange={e => setF("niche", e.target.value)} style={{ width: 160 }}>
            <option value="all">All niches</option>
            {niches.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </Field>
        <Field label="City">
          <input className="input" value={filters.city} onChange={e => setF("city", e.target.value)} placeholder="Any" style={{ width: 130 }} />
        </Field>
        <Field label="Scan type">
          <select className="select" value={filters.scanType} onChange={e => setF("scanType", e.target.value)} style={{ width: 130 }}>
            <option value="all">All</option>
            <option value="gbp">GBP only</option>
            <option value="a11y">A11y only</option>
            <option value="combined">Combined</option>
          </select>
        </Field>
        <Field label="Angle">
          <Segmented value={filters.angle} onChange={(v) => setF("angle", v)}
            options={[
              { value: "all", label: "All" },
              { value: "both", label: "Both" },
              { value: "gbp", label: "GBP" },
              { value: "a11y", label: "A11y" },
            ]}
          />
        </Field>
        <Field label={`Min score · ${filters.minScore}+`}>
          <input type="range" min="0" max="100" step="5" value={filters.minScore} onChange={e => setF("minScore", +e.target.value)} style={{ width: 110, accentColor: "var(--ink)" }} />
        </Field>
        <div className="filter-action">
          <label style={{ display: "inline-flex", alignItems: "center", gap: 7, fontSize: 12, color: "var(--stone-700)", cursor: "pointer" }}>
            <Checkbox checked={filters.warm} onChange={(c) => setF("warm", c)} />
            Warm leads only
          </label>
          <Button kind="ghost" size="sm" onClick={() => setFilters({ from: "", to: "", niche: "all", city: "", scanType: "all", minScore: 0, angle: "all", warm: false })}>Reset</Button>
        </div>
      </div>

      {/* Table */}
      <div style={{ border: "1px solid var(--line)", borderRadius: 6, overflow: "hidden", background: "var(--paper)" }}>
        <table className="ptable">
          <thead>
            <tr>
              <th style={{ width: "26%" }}>Business</th>
              <th>Niche · City</th>
              <th style={{ width: "8%" }}>Combined</th>
              <th style={{ width: "6%" }}>GBP</th>
              <th style={{ width: "6%" }}>A11y</th>
              <th style={{ width: "10%" }}>Angle</th>
              <th style={{ width: "16%" }}>Outreach history</th>
              <th style={{ width: "12%", textAlign: "right" }}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(p => (
              <tr key={p.id} className={p.warm ? "warm" : ""} onClick={() => navigate("prospect", { id: p.id })}>
                <td className="biz">
                  {p.business}
                  <span className="url">{p.url}</span>
                </td>
                <td>
                  <div style={{ fontSize: 12.5 }}>{p.niche}</div>
                  <div style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--stone-500)" }}>{p.city}</div>
                </td>
                <td><ScoreBadge value={p.combined} /></td>
                <td className="num">{p.gbp ?? "—"}</td>
                <td className="num">{p.a11y ?? "—"}</td>
                <td><AnglePill angle={p.angle} /></td>
                <td>
                  {p.outreachSent
                    ? <div>
                        <div style={{ fontSize: 12 }}><b style={{ fontWeight: 500 }}>Sent</b> · {p.outreachSent.split(" · ")[0]}</div>
                        {p.warm && <div style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--accent-ink)" }}>Viewed {p.lastViewed}</div>}
                      </div>
                    : <span style={{ fontSize: 12, color: "var(--stone-500)" }}>—</span>}
                </td>
                <td onClick={(e) => e.stopPropagation()} style={{ textAlign: "right" }}>
                  <div className="row-actions">
                    {p.reportToken && (
                      <button className="btn-icon" title="Copy report link" onClick={() => navigator.clipboard?.writeText(`https://report.nthdesigns.co.uk/r/${p.reportToken}`)}>
                        <svg viewBox="0 0 16 16"><path d={Icons.Copy} /></svg>
                      </button>
                    )}
                    {!inOutreach(p.id)
                      ? <button className="btn-icon" title="Add to outreach" onClick={() => addToOutreach([p.id])}>
                          <svg viewBox="0 0 16 16"><path d={Icons.Plus} /></svg>
                        </button>
                      : <span className="badge" style={{ fontSize: 10, background: "var(--stone-200)" }}>In queue</span>}
                    <button className="btn-icon" title="Open" onClick={() => navigate("prospect", { id: p.id })}>
                      <svg viewBox="0 0 16 16"><path d={Icons.ChevronR} /></svg>
                    </button>
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{ padding: "60px 20px", textAlign: "center" }}>
                <div style={{ color: "var(--stone-500)", fontSize: 13 }}>No prospects match these filters. <a style={{ color: "var(--ink)", cursor: "pointer", textDecoration: "underline" }} onClick={() => setFilters({ from: "", to: "", niche: "all", city: "", scanType: "all", minScore: 0, angle: "all", warm: false })}>Reset</a>.</div>
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </main>
  );
}

// ─── F. Reports dashboard ────────────────────────────────────────
function ReportsScreen({ navigate }) {
  const [filter, setFilter] = useState("all"); // all | viewed | unviewed | warm
  const [niche, setNiche] = useState("all");
  const [copyToast, setCopyToast] = useState(null);

  const reports = DATA.reports.filter(r => {
    if (filter === "viewed" && r.views === 0) return false;
    if (filter === "unviewed" && r.views > 0) return false;
    if (filter === "warm" && !r.warmBadge) return false;
    if (niche !== "all" && r.niche !== niche) return false;
    return true;
  });

  const niches = Array.from(new Set(DATA.reports.map(r => r.niche)));

  const copyToken = (token) => {
    const url = `https://report.nthdesigns.co.uk/r/${token}`;
    if (navigator.clipboard) navigator.clipboard.writeText(url).catch(() => {});
    setCopyToast(token);
    setTimeout(() => setCopyToast(null), 1800);
  };

  const totalViews = DATA.reports.reduce((sum, r) => sum + r.views, 0);
  const viewedCount = DATA.reports.filter(r => r.views > 0).length;
  const warmCount = DATA.reports.filter(r => r.warmBadge).length;

  return (
    <main className="page-wide page" style={{ maxWidth: 1440 }}>
      <PageHeader
        eyebrow="F · Reports dashboard"
        title="Every public report you've shared."
        sub="Track who opened what, copy the unlisted URL, and surface warm leads — anything viewed in the last 7 days gets the badge."
      />

      {/* Stats strip */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16, marginBottom: 24 }}>
        <div className="card card-pad"><Stat label="Reports generated" value={DATA.reports.length} hint="across 4 searches" /></div>
        <div className="card card-pad"><Stat label="Total views" value={totalViews} hint={`${viewedCount} of ${DATA.reports.length} opened`} /></div>
        <div className="card card-pad" style={{ borderColor: "oklch(0.85 0.08 65)", background: "linear-gradient(180deg, var(--accent-soft) 0%, var(--paper) 70%)" }}>
          <Stat label="Warm · 7d" value={warmCount} hint="viewed in last week" />
        </div>
        <div className="card card-pad"><Stat label="Avg views per report" value={(totalViews / DATA.reports.length).toFixed(1)} hint="median: 2" /></div>
      </div>

      {/* Filter bar */}
      <div className="filter-bar">
        <Field label="View status">
          <Segmented value={filter} onChange={setFilter}
            options={[
              { value: "all", label: "All" },
              { value: "viewed", label: "Viewed" },
              { value: "unviewed", label: "Unviewed" },
              { value: "warm", label: "Warm · 7d" },
            ]}
          />
        </Field>
        <Field label="Niche">
          <select className="select" value={niche} onChange={e => setNiche(e.target.value)} style={{ width: 160 }}>
            <option value="all">All niches</option>
            {niches.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </Field>
        <div className="filter-action">
          <span className="micro">{reports.length} of {DATA.reports.length}</span>
        </div>
      </div>

      <div style={{ border: "1px solid var(--line)", borderRadius: 6, overflow: "hidden", background: "var(--paper)", position: "relative" }}>
        <table className="ptable">
          <thead>
            <tr>
              <th style={{ width: "26%" }}>Business</th>
              <th style={{ width: "20%" }}>Public URL</th>
              <th style={{ width: "9%" }}>Created</th>
              <th style={{ width: "8%" }}>Views</th>
              <th style={{ width: "13%" }}>Last viewed</th>
              <th style={{ width: "12%" }}>Viewer</th>
              <th style={{ width: "12%", textAlign: "right" }}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {reports.map(r => (
              <tr key={r.token} className={r.warmBadge ? "warm" : ""} onClick={() => navigate("prospect", { id: r.prospectId })}>
                <td className="biz">
                  {r.business}
                  <span className="url">{r.niche}</span>
                </td>
                <td>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <code style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--stone-700)", background: "var(--paper-2)", padding: "2px 6px", borderRadius: 2, border: "1px solid var(--line)" }}>/r/{r.token}</code>
                    {r.warmBadge && <Status kind="warm">Warm</Status>}
                  </div>
                </td>
                <td className="num">{r.created}</td>
                <td>
                  <span style={{
                    fontFamily: "var(--mono)",
                    fontVariantNumeric: "tabular-nums",
                    fontSize: 13,
                    fontWeight: r.views > 0 ? 500 : 400,
                    color: r.views > 0 ? "var(--ink)" : "var(--stone-400)"
                  }}>{r.views}</span>
                  {r.warmBadge && <span style={{ marginLeft: 6, fontSize: 10, color: "var(--accent-deep)" }}>● new</span>}
                </td>
                <td className="num" style={{ color: r.lastViewed ? "var(--ink)" : "var(--stone-400)", fontSize: 12 }}>
                  {r.lastViewed || "—"}
                </td>
                <td style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--stone-600)" }}>
                  {r.viewerIp || <span style={{ color: "var(--stone-400)" }}>—</span>}
                </td>
                <td onClick={(e) => e.stopPropagation()} style={{ textAlign: "right" }}>
                  <div className="row-actions">
                    <button className="btn-icon" title="Copy URL" onClick={() => copyToken(r.token)}>
                      <svg viewBox="0 0 16 16"><path d={copyToast === r.token ? Icons.Check : Icons.Copy} /></svg>
                    </button>
                    <button className="btn-icon" title="Open report" onClick={() => navigate("public", { token: r.token })}>

function PublicReportScreen({ token, navigate, viewport = "desktop", setViewport }) {
  const report = DATA.reports.find(r => r.token === token) || DATA.reports[1]; // default to Birmingham Dental
  const prospect = DATA.prospects.find(p => p.id === report.prospectId);
  const isMobile = viewport === "mobile";

  // Calculate grade A–F from combined (inverted: high combined = low grade)
  const grade = (() => {
    const c = prospect.combined;
    if (c >= 85) return "D";
    if (c >= 70) return "C";
    if (c >= 50) return "C+";
    if (c >= 30) return "B";
    return "B+";
  })();
  const gradeColor = (() => {
    const c = prospect.combined;
    if (c >= 71) return "var(--sev-critical)";
    if (c >= 41) return "oklch(0.55 0.13 50)";
    return "var(--positive)";
  })();

  return (
    <div style={{
      background: "oklch(0.965 0.008 80)",
      minHeight: "100vh",

function Marker({ sev, label, pos, dashed }) {
  const sevColor = sev === "critical" ? "var(--sev-critical)" : sev === "serious" ? "oklch(0.55 0.14 50)" : "oklch(0.55 0.08 80)";
  return (
    <>
      <div style={{
        position: "absolute",
        ...pos,
        border: `1.4px ${dashed ? "dashed" : "solid"} ${sevColor}`,
        borderRadius: 2,
        pointerEvents: "none",
      }} />
      <div style={{
        position: "absolute",
        ...(pos.bottom != null ? { bottom: -10 } : { top: pos.top != null ? pos.top - 13 : 0 }),
        ...(pos.right != null ? { right: pos.right } : { left: pos.left }),
        background: sevColor,
        color: "var(--paper)",
        padding: "1px 5px",
        fontSize: 8.5,
        fontFamily: "var(--mono)",
        borderRadius: 1,
        letterSpacing: "0.02em",
        whiteSpace: "nowrap"
      }}>{label}</div>
    </>
  );
}

function PerfDial({ label, value, note, isMobile }) {
  const color = value < 50 ? "var(--sev-critical)" : value < 70 ? "oklch(0.55 0.14 50)" : "var(--positive)";
  const size = isMobile ? 80 : 120;
  const stroke = isMobile ? 6 : 8;
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ textAlign: "center" }}>
      <div style={{ position: "relative", width: size, height: size, margin: "0 auto" }}>
        <svg viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size / 2} cy={size / 2} r={r} stroke="var(--stone-200)" strokeWidth={stroke} fill="none" />
          <circle cx={size / 2} cy={size / 2} r={r}
            stroke={color}
            strokeWidth={stroke}
            fill="none"
            strokeDasharray={circ}
            strokeDashoffset={circ * (1 - value / 100)}
            strokeLinecap="round"
          />
        </svg>
        <div style={{
          position: "absolute",
          inset: 0,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontFamily: "var(--serif)",
          fontSize: isMobile ? 28 : 38,
          color: color,
          fontVariantNumeric: "tabular-nums",
          letterSpacing: "-0.02em"
        }}>{value}</div>
      </div>
      <div style={{ fontSize: isMobile ? 13 : 14, fontWeight: 500, marginTop: 10 }}>{label}</div>
      {!isMobile && <div className="mono" style={{ fontSize: 10.5, color: "var(--stone-500)", marginTop: 4 }}>{note}</div>}
    </div>
  );
}

window.PublicReportScreen = PublicReportScreen;

<script type="text/babel">
// ─── ROUTER & APP ─────────────────────────────────────────────────
function mountApp() {
  if (!window.AppShell || !window.SearchScreen || !window.PublicReportScreen) {
    return setTimeout(mountApp, 30);
  }

  const {
    AppShell, SearchScreen, SearchResultsScreen, ProspectScreen, OutreachScreen,
    SavedScreen, ReportsScreen, SettingsScreen, PublicReportScreen,
    AnnoProvider, Anno, Toast, Icon, Icons, useState, useEffect
  } = window;

  function parseHash() {
    const h = (window.location.hash || "#/search").replace(/^#\/?/, "");
    const [path, ...rest] = h.split("?");
    const params = {};
    if (rest.length > 0) {
      rest.join("?").split("&").forEach(kv => {
        const [k, v] = kv.split("=");
        if (k) params[k] = decodeURIComponent(v || "");
      });
    }
    return { path: path || "search", params };
  }

  function App() {
    const [{ path, params }, setRoute] = useState(parseHash());
    const [annoActive, setAnnoActive] = useState(false);
    const [selection, setSelection] = useState(["p-101", "p-104", "p-109"]);
    const [toast, setToast] = useState(null);
    const [publicViewport, setPublicViewport] = useState("desktop");

    useEffect(() => {
      const onHash = () => setRoute(parseHash());
      window.addEventListener("hashchange", onHash);
      return () => window.removeEventListener("hashchange", onHash);
    }, []);

    const navigate = (target, p = {}) => {
      const qs = Object.keys(p).length ? "?" + Object.entries(p).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&") : "";
      window.location.hash = `#/${target}${qs}`;
      window.scrollTo({ top: 0, behavior: "instant" });
    };

    const addToOutreach = (ids) => {
      setSelection((cur) => {
        const next = Array.from(new Set([...cur, ...ids]));
        const added = next.length - cur.length;
        if (added > 0) setToast(`Added ${added} prospect${added === 1 ? "" : "s"} to outreach queue`);
        return next;
      });
    };
    const removeFromOutreach = (id) => {
      setSelection(s => s.filter(x => x !== id));
    };

    // Choose screen
    let screen, isPublic = false;
    if (path === "public" || path === "r") {
      isPublic = true;
      screen = <PublicReportScreen token={params.token || "bx7-9k2m-q4"} navigate={navigate} viewport={publicViewport} setViewport={setPublicViewport} />;
    } else if (path === "search/results") {
      const searchId = params.id || "s-001";
      const search = DATA.searches.find(s => s.id === searchId) || DATA.searches[0];
      const live = params.live === "1" ? { live: true } : {};
      screen = <SearchResultsScreen search={{ ...search, ...live }} navigate={navigate} addToOutreach={addToOutreach} selection={selection} />;
    } else if (path === "prospect") {
      const p = DATA.prospects.find(x => x.id === (params.id || "p-101")) || DATA.prospects[0];
      screen = <ProspectScreen prospect={p} navigate={navigate} addToOutreach={addToOutreach} selection={selection} />;
    } else if (path === "outreach") {
      screen = <OutreachScreen navigate={navigate} selection={selection} removeFromOutreach={removeFromOutreach} />;
    } else if (path === "saved") {
      screen = <SavedScreen navigate={navigate} addToOutreach={addToOutreach} selection={selection} />;
    } else if (path === "reports") {
      screen = <ReportsScreen navigate={navigate} />;
    } else if (path === "settings") {
      screen = <SettingsScreen navigate={navigate} />;
    } else {
      // "search" default
      screen = <SearchScreen navigate={navigate} startSearch={() => navigate("search/results", { id: "s-001", live: "1" })} />;
    }

    if (isPublic) {
      return <AnnoProvider active={false}>{screen}</AnnoProvider>;
    }

    return (
      <AnnoProvider active={annoActive}>
        <AppShell route={path} navigate={navigate} selectionCount={selection.length}>
          {screen}
        </AppShell>

        {/* Annotation toggle */}
        <button
          className={`anno-toggle ${annoActive ? "active" : ""}`}
          onClick={() => setAnnoActive(a => !a)}
          title="Toggle annotation overlay"
        >
          <span className="dot" />
          {annoActive ? "Annotations on" : "Show annotations"}
        </button>

        {toast && (
          <div className="toast">
            <span className="check"><svg viewBox="0 0 12 12"><path d="M3 6.5l2 2 4-5" stroke="white" strokeWidth="2" fill="none" /></svg></span>
            {toast}
            <button
              onClick={() => setToast(null)}
              style={{ background: "transparent", border: 0, color: "oklch(0.7 0.01 60)", cursor: "pointer", marginLeft: 8, fontSize: 16, padding: 0, lineHeight: 1 }}
            >×</button>
          </div>
        )}
      </AnnoProvider>
    );
  }

  // Auto-dismiss toast
  // (handled inside App via setTimeout in setToast wrapper - keep simple)

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}

mountApp();
</script>
